<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Minimalist Vocab</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --sub-color: #888888;
            --border-color: #eeeeee;
            --overlay-bg: rgba(255,255,255,0.96);
            --dot-color: #111111;
            --toast-bg: rgba(0,0,0,0.05);
        }
        [data-theme="dark"] {
            --bg-color: #1C1C1E;
            --text-color: #E5E5EA;
            --sub-color: #8E8E93;
            --border-color: #2C2C2E;
            --overlay-bg: rgba(28,28,30,0.96);
            --dot-color: #FFFFFF;
            --toast-bg: rgba(255,255,255,0.1);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            padding-top: env(safe-area-inset-top);
            transition: background-color 0.3s, color 0.3s;
        }
        .nav-bar {
            position: absolute;
            top: 25px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .nav-left, .nav-right {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .nav-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 16px;
            cursor: pointer;
            padding: 12px 14px;
            letter-spacing: 1px;
            opacity: 0.8;
            transition: opacity 0.2s;
            touch-action: manipulation;
        }
        .nav-btn:hover { opacity: 0.5; }
        #currentListNameBtn {
            font-weight: 500;
            border-bottom: 1px dashed var(--text-color);
            padding-bottom: 2px;
        }
        .stage-container {
            width: 100%;
            height: 100%;
            perspective: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
        }
        .stage-container:active { cursor: grabbing; }
        .space3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            /* 讓縮放與旋轉的核心集中在中心 */
            transform-origin: center center; 
        }
        .word-card {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-style: preserve-3d;
            cursor: pointer;
            white-space: nowrap;
            padding: 15px;
        }
        .word-text {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 0.5px;
            position: relative;
            display: inline-block;
            pointer-events: none;
        }
        .wrong-dot {
            position: absolute;
            background-color: var(--dot-color);
            border-radius: 50%;
            display: none;
        }
        .focus-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .focus-overlay.active { opacity: 1; pointer-events: auto; }
        .focus-word { font-size: 44px; font-weight: 300; margin-bottom: 15px; letter-spacing: 1px; text-align: center; }
        .focus-trans {
            font-size: 18px;
            color: var(--sub-color);
            margin-bottom: 35px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 400;
            cursor: pointer;
            text-align: center;
            padding: 0 20px;
            touch-action: manipulation;
        }
        .action-group { display: flex; gap: 15px; margin-bottom: 40px; }
        .action-btn {
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 12px 26px;
            font-size: 15px;
            cursor: pointer;
            border-radius: 24px;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .action-btn:hover { background-color: var(--text-color); color: var(--bg-color); }
        .switch-word-group { display: flex; gap: 30px; align-items: center; }
        .arrow-btn { background: none; border: none; color: var(--sub-color); font-size: 16px; cursor: pointer; padding: 15px; touch-action: manipulation; }
        .arrow-btn:hover { color: var(--text-color); }
        .toast {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toast-bg);
            color: var(--text-color);
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 400;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 300;
            display: flex;
            flex-direction: column;
            padding: 60px 25px 40px 25px;
            overflow-y: auto;
            display: none;
            touch-action: pan-y;
        }
        .modal.active { display: flex; }
        .modal-title { font-size: 24px; font-weight: 300; margin-bottom: 25px; text-align: center; }
        textarea, input[type="text"], select {
            width: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 14px;
            font-size: 16px;
            outline: none;
            margin-bottom: 15px;
            -webkit-appearance: none;
            touch-action: manipulation;
        }
        textarea { height: 150px; resize: none; user-select: text; -webkit-user-select: text; }
        .section-subtitle { font-size: 16px; font-weight: 500; margin-top: 15px; margin-bottom: 10px; border-left: 3px solid var(--text-color); padding-left: 8px; }
        .list-item-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 10px; border-bottom: 1px solid var(--border-color); }
        .list-item-row:hover { background-color: var(--border-color); }
        .list-checkbox-label { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; font-size: 16px; }
        .list-checkbox-label input { width: 20px; height: 20px; }
        .list-actions { display: flex; gap: 12px; }
        .sm-btn { font-size: 14px; color: var(--sub-color); background: none; border: none; cursor: pointer; padding: 6px 4px; touch-action: manipulation; }
        .sub-words-list { background: var(--toast-bg); padding: 5px 15px; border-radius: 6px; margin: 5px 10px 15px 10px; display: none; flex-direction: column; max-height: 250px; overflow-y: auto; }
        .sub-words-list.active { display: flex; }
        .word-manage-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--border-color); font-size: 14px; }
        .word-manage-item:last-child { border-bottom: none; }
        .preview-box { border: 1px dashed var(--border-color); padding: 15px; border-radius: 8px; max-height: 200px; overflow-y: auto; margin-bottom: 15px; font-size: 14px; }
        .preview-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 4px; gap: 15px; }
        .preview-edit-input { flex: 1; max-width: 200px; font-size: 14px; padding: 6px 8px; margin-bottom: 0; border-radius: 4px; user-select: text; -webkit-user-select: text; }
        .quiz-container { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; width: 100%; }
        .quiz-q { font-size: 38px; font-weight: 300; margin-bottom: 40px; text-align: center; }
        .quiz-options { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 14px; }
        .quiz-opt-btn { width: 100%; padding: 16px; background: none; border: 1px solid var(--text-color); color: var(--text-color); font-size: 16px; cursor: pointer; text-align: center; border-radius: 8px; touch-action: manipulation; }
        .quiz-opt-btn:hover { background-color: var(--text-color); color: var(--bg-color); }
    </style>
</head>
<body>
    <div class="toast" id="toastNotice">提示</div>
    <div class="nav-bar">
        <div class="nav-left">
            <button class="nav-btn" id="currentListNameBtn" onclick="openModal('listsModal')">選擇單字包</button>
            <button class="nav-btn" onclick="openModal('importModal')">匯入</button>
            <button class="nav-btn" onclick="startQuiz()">測驗</button>
        </div>
        <div class="nav-right">
            <button class="nav-btn" id="themeBtn" onclick="toggleTheme()">深色模式</button>
        </div>
    </div>
    <div class="stage-container" id="stageContainer">
        <div class="space3d" id="space3d"></div>
    </div>
    <div class="focus-overlay" id="focusOverlay">
        <div class="focus-word" id="focusWord">Word</div>
        <div class="focus-trans" id="focusTrans" onclick="revealTranslation()">點擊顯示翻譯</div>
        <div class="action-group">
            <button class="action-btn" onclick="markLearned(true)">記住了</button>
            <button class="action-btn" onclick="markLearned(false)">還沒記住</button>
        </div>
        <div class="switch-word-group">
            <button class="arrow-btn" onclick="switchFocusAdjacent(-1)">← 上一個</button>
            <button class="action-btn" style="border:none; padding:12px 20px;" onclick="closeFocus()">返回海中</button>
            <button class="arrow-btn" onclick="switchFocusAdjacent(1)">下一個 →</button>
        </div>
    </div>
    <div class="modal" id="listsModal">
        <div class="modal-title">我的單字表與組合</div>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" id="newListNameInput" placeholder="輸入新單字表名稱..." style="margin-bottom:0;">
            <button class="action-btn" onclick="createNewList()">創立</button>
        </div>
        <div class="section-subtitle">基礎單字包（可多選）</div>
        <div id="listsContainer" style="max-height: 350px; overflow-y: auto;"></div>
        <div style="display: flex; gap: 10px; margin-top: 15px; align-items: center;">
            <input type="text" id="newComboNameInput" placeholder="將目前勾選存為新組合名稱..." style="margin-bottom:0;">
            <button class="action-btn" onclick="saveCurrentCombo()">儲存此組合</button>
        </div>
        <div class="section-subtitle">已存組合包</div>
        <div id="combosContainer" style="max-height: 150px; overflow-y: auto;"></div>
        <button class="action-btn" style="width:100%; margin-top:20px; background-color: var(--text-color); color: var(--bg-color);" onclick="applySelectedLists()">確認應用選取</button>
        <button class="nav-btn" style="margin-top:10px; padding: 15px;" onclick="closeModal('listsModal')">關閉</button>
    </div>
    <div class="modal" id="importModal">
        <div class="modal-title">自動查詞匯入</div>
        <p style="font-size: 13px; color: var(--sub-color); margin-bottom: 10px; text-align: center;">請選擇要匯入的目的地：</p>
        <select id="importTargetSelect"></select>
        <p style="font-size: 13px; color: var(--sub-color); margin-bottom: 10px; text-align: center;">請輸入單字（一行一個）。支援直接帶有翻譯，例如：apple 蘋果</p>
        <textarea id="importInput" placeholder="apple 蘋果&#10;banana 香蕉&#10;serendipity 不期而遇的美好&#10;ephemeral"></textarea>
        <button id="startQueryBtn" class="action-btn" style="width:100%; margin-bottom:20px;" onclick="fetchTranslationsOnline()">開始自動查詢與解析</button>
        <div id="queryPreviewSection" style="display:none; flex: 1; display: flex; flex-direction: column;">
            <p style="margin-bottom:10px; font-weight: 500;">字典查詢預覽（可在下方框內直接修改翻譯）：</p>
            <div class="preview-box" id="previewBox"></div>
            <button class="action-btn" style="width:100%; margin-top:10px; background-color: var(--text-color); color: var(--bg-color);" onclick="saveImportedWordsOnline()">確認無誤，匯入海中</button>
        </div>
        <button class="nav-btn" style="margin-top:auto; padding: 15px;" onclick="closeImportModal()">取消退出</button>
    </div>
    <div class="modal" id="quizModal">
        <div class="modal-title">自我測驗</div>
        <div class="quiz-container" id="quizContainer"></div>
        <button class="nav-btn" style="margin-top:auto; padding: 15px;" onclick="closeModal('quizModal')">結束測驗</button>
    </div>
    <script>
        const defaultPackage = {
            currentListIds: ['list_default'], 
            lists: {
                'list_default': { 
                    name: '初始單字表', 
                    words: [
                        { id: 1, word: 'serendipity', trans: ['不期而遇的美好'], wrongCount: 2, lastReviewed: Date.now() - 900000000 }, 
                        { id: 2, word: 'こもれび', trans: ['從樹葉縫隙漏下來的陽光'], wrongCount: 0, lastReviewed: Date.now() }, 
                        { id: 3, word: 'ephemeral', trans: ['轉瞬即逝的'], wrongCount: 4, lastReviewed: Date.now() - 500000000 }, 
                        { id: 4, word: 'しんりんよく', trans: ['森林浴'], wrongCount: 1, lastReviewed: Date.now() }
                    ]
                } 
            }, 
            combos: {} 
        };
        
        let appData = JSON.parse(localStorage.getItem('vocab_app_data')) || defaultPackage;
        if (appData.lists && appData.lists['list_default'] && appData.lists['list_default'].name === '核心字彙') {
            appData.lists['list_default'].name = '初始單字表'; 
        }
        if (!Array.isArray(appData.currentListIds)) {
            appData.currentListIds = appData.currentListId ? [appData.currentListId] : ['list_default']; 
        }
        if (!appData.combos) appData.combos = {};
        
        let currentFocusIndex = -1;
        let onlineImportList = [];
        let rotX = 0, rotY = 0;
        let translateZ = -300; // 控制縮放的深度變數，預設往後退 300px
        let isDragging = false;
        let dragMoved = false;
        let startX, startY;
        let initialPinchDist = null; // 用於手機雙指縮放

        function getCombinedWords() {
            let combined = []; 
            appData.currentListIds.forEach(id => {
                if (appData.lists[id]) {
                    appData.lists[id].words.forEach(w => { combined.push({ ...w, originListId: id }); }); 
                } 
            }); 
            return combined; 
        }
        
        window.onload = function() {
            const savedTheme = localStorage.getItem('theme') || 'dark'; 
            document.documentElement.setAttribute('data-theme', savedTheme); 
            document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? '淺色模式' : '深色模式'; 
            updateNavBarTitle(); 
            render3DSpace(); 
            init3DControl(); 
            animate(); 
        };
        
        function showToast(msg) {
            const toast = document.getElementById('toastNotice'); 
            toast.innerText = msg; 
            toast.classList.add('show'); 
            setTimeout(() => toast.classList.remove('show'), 1200); 
        }
        
        function saveToStorage() { localStorage.setItem('vocab_app_data', JSON.stringify(appData)); }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme'); 
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark'; 
            document.documentElement.setAttribute('data-theme', newTheme); 
            localStorage.setItem('theme', newTheme); 
            document.getElementById('themeBtn').innerText = newTheme === 'dark' ? '淺色模式' : '深色模式'; 
            render3DSpace(); 
        }
        
        function updateNavBarTitle() {
            if (appData.currentListIds.length === 1) {
                const id = appData.currentListIds[0]; 
                document.getElementById('currentListNameBtn').innerText = appData.lists[id] ? appData.lists[id].name : '選擇單字表'; 
            } else {
                document.getElementById('currentListNameBtn').innerText = `已選 ${appData.currentListIds.length} 個單字包`; 
            } 
        }
        
        // 核心修改 1：改造成圓筒狀環繞（Cylinder Layout）
        function render3DSpace() {
            const space = document.getElementById('space3d'); 
            space.innerHTML = ''; 
            const wordsArr = getCombinedWords(); 
            if (wordsArr.length === 0) {
                space.innerHTML = `<div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:var(--sub-color); font-size:14px; text-align:center; width:80%;">目前無選取單字包或包內空空的，請點選「匯入」或更改單字包勾選</div>`; 
                return; 
            } 
            
            const isMobilePortrait = window.innerWidth < window.innerHeight; 
            // 圓筒半徑：人在中間，單字在外圈圍繞。半徑大一點，空間感比較好
            const radius = isMobilePortrait ? window.innerWidth * 0.7 : 450; 
            
            // 計算縱向分層與每層單字數
            const totalWords = wordsArr.length;
            // 根據單字量自動決定分幾層高（每層放 8~12 個效果最好）
            const wordsPerLayer = Math.min(10, totalWords);
            const heightStep = 110; // 每層的縱向間距
            
            wordsArr.forEach((item, index) => {
                const card = document.createElement('div'); 
                card.className = 'word-card'; 
                card.setAttribute('data-index', index); 
                
                // 計算筒狀座標
                const layer = Math.floor(index / wordsPerLayer); // 第幾層
                const totalLayers = Math.ceil(totalWords / wordsPerLayer);
                const layerIndex = index % wordsPerLayer; // 當前層的第幾個
                
                // 角度（水平環繞）
                const theta = (layerIndex / wordsPerLayer) * 2 * Math.PI;
                
                // 3D 空間座標位置
                const x = radius * Math.sin(theta);
                const z = radius * Math.cos(theta);
                // 縱向居中排列
                const y = (layer - (totalLayers - 1) / 2) * heightStep; 
                
                const daysUnreviewed = (Date.now() - item.lastReviewed) / (1000 * 60 * 60 * 24); 
                let sizeScale = daysUnreviewed > 3 ? 1.35 : 1; 
                
                card.dataset.x = x; 
                card.dataset.y = y; 
                card.dataset.z = z; 
                card.dataset.scale = sizeScale; 
                
                // 初始位置設定
                card.style.transform = `translate3d(${x}px, ${y}px, ${z}px) scale(${sizeScale})`; 
                
                const textSpan = document.createElement('span'); 
                textSpan.className = 'word-text'; 
                if (isMobilePortrait && item.word.length > 10) textSpan.style.fontSize = '18px'; 
                textSpan.innerText = item.word; 
                
                if(item.wrongCount > 0) {
                    const dot = document.createElement('div'); 
                    dot.className = 'wrong-dot'; 
                    dot.style.display = 'block'; 
                    const dotSize = Math.min(5 + item.wrongCount * 1.5, 13); 
                    dot.style.width = dotSize + 'px'; 
                    dot.style.height = dotSize + 'px'; 
                    dot.style.top = `-${dotSize/2}px`; 
                    dot.style.right = `-${dotSize}px`; 
                    textSpan.appendChild(dot); 
                } 
                card.appendChild(textSpan); 
                
                card.addEventListener('pointerup', (e) => {
                    if (dragMoved) return; 
                    e.stopPropagation(); 
                    openFocus(index); 
                }); 
                space.appendChild(card); 
            }); 
            updateBillboards(); 
        }
        
        function updateBillboards() {
            const cards = document.querySelectorAll('.word-card'); 
            cards.forEach(card => {
                const x = card.dataset.x; 
                const y = card.dataset.y; 
                const z = card.dataset.z; 
                const scale = card.dataset.scale; 
                // 這裡加入 rotateY 和 rotateX 修正，讓單字不論怎麼轉都面向鏡頭 (Billboard Effect)
                card.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateY(${-rotY}deg) rotateX(${-rotX}deg) scale(${scale})`; 
            }); 
        }
        
        // 核心修改 2：舞台加入 3D 的 translateZ（前後縮放移動）
        function updateSpaceTransform() {
            document.getElementById('space3d').style.transform = `translateZ(${translateZ}px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        }
        
        function init3DControl() {
            const container = document.getElementById('stageContainer'); 
            
            const dragStart = (x, y) => {
                isDragging = true; 
                dragMoved = false; 
                startX = x; 
                startY = y; 
            };
            
            const dragMove = (x, y) => {
                if (!isDragging) return; 
                const dx = x - startX; 
                const dy = y - startY; 
                if (Math.abs(dx) > 4 || Math.abs(dy) > 4) { dragMoved = true; } 
                rotY += dx * 0.25; 
                rotX -= dy * 0.25; 
                
                // 限制上下視角，避免翻轉過頭頭暈
                rotX = Math.max(-45, Math.min(45, rotX));
                
                startX = x; 
                startY = y; 
                updateSpaceTransform();
                updateBillboards(); 
            };
            
            const dragEnd = () => { setTimeout(() => { isDragging = false; }, 10); }; 
            
            // 電腦端滑鼠滾輪縮放
            window.addEventListener('wheel', (e) => {
                // 排除彈窗內捲動干擾
                if (document.querySelector('.modal.active')) return;
                
                translateZ -= e.deltaY * 0.
