<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Minimalist Vocab</title>
    <style>
        :root {
            --bg-color: #1C1C1E;
            --text-color: #E5E5EA;
            --sub-color: #8E8E93;
            --border-color: #2C2C2E;
            --overlay-bg: rgba(28,28,30,0.96);
            --dot-color: #FFFFFF;
            --toast-bg: rgba(255,255,255,0.1);
            --badge-bg: #2C2C2E;
            --badge-active-bg: #E5E5EA;
            --badge-active-text: #1C1C1E;
        }
        [data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #111111;
            --sub-color: #888888;
            --border-color: #eeeeee;
            --overlay-bg: rgba(255,255,255,0.96);
            --dot-color: #111111;
            --toast-bg: rgba(0,0,0,0.05);
            --badge-bg: #eeeeee;
            --badge-active-bg: #111111;
            --badge-active-text: #ffffff;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            padding-top: env(safe-area-inset-top);
            transition: background-color 0.3s, color 0.3s;
        }
        .nav-bar {
            position: absolute;
            top: 25px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .nav-left, .nav-right {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .nav-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 16px;
            cursor: pointer;
            padding: 12px 14px;
            letter-spacing: 1px;
            opacity: 0.8;
            transition: opacity 0.2s;
            touch-action: manipulation;
        }
        .nav-btn:hover {
            opacity: 0.5;
        }
        #currentListNameBtn {
            font-weight: 500;
            border-bottom: 1px dashed var(--text-color);
            padding-bottom: 2px;
        }
        .stage-container {
            width: 100%;
            height: 100%;
            perspective: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            touch-action: none;
        }
        .stage-container:active {
            cursor: grabbing;
        }
        .space3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform-origin: center center;
        }
        .word-card {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-style: preserve-3d;
            cursor: pointer;
            white-space: nowrap;
            padding: 15px;
            backface-visibility: visible; 
            margin-left: -50px; 
            margin-top: -20px;
        }
        .word-text {
            font-size: 24px; 
            font-weight: 300;
            letter-spacing: 0.5px;
            position: relative;
            display: inline-block;
            pointer-events: none;
        }
        .wrong-dot {
            position: absolute;
            background-color: var(--dot-color);
            border-radius: 50%;
            display: none;
        }
        .focus-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            touch-action: none;
        }
        .focus-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .focus-word {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-align: center;
        }
        .focus-trans {
            font-size: 20px;
            color: var(--sub-color);
            margin-bottom: 35px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 400;
            cursor: pointer;
            text-align: center;
            padding: 0 20px;
            touch-action: manipulation;
        }
        .action-group {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }
        .action-btn {
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 12px 26px;
            font-size: 15px;
            cursor: pointer;
            border-radius: 24px;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .action-btn:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
        .switch-word-group {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        .arrow-btn {
            background: none;
            border: none;
            color: var(--sub-color);
            font-size: 16px;
            cursor: pointer;
            padding: 15px;
            touch-action: manipulation;
        }
        .arrow-btn:hover {
            color: var(--text-color);
        }
        .toast {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toast-bg);
            color: var(--text-color);
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 400;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 300;
            display: flex;
            flex-direction: column;
            padding: 60px 25px 40px 25px;
            overflow-y: auto;
            display: none;
            touch-action: pan-y;
        }
        .modal.active {
            display: flex;
        }
        .modal-title {
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 20px;
            text-align: center;
        }
        textarea, input[type="text"], select {
            width: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 14px;
            font-size: 16px;
            outline: none;
            margin-bottom: 12px;
            -webkit-appearance: none;
            touch-action: manipulation;
        }
        textarea {
            height: 90px;
            resize: none;
            user-select: text;
            -webkit-user-select: text;
        }
        #queryPreviewSection {
            flex: none;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .preview-box {
            border: 1px dashed var(--border-color);
            padding: 8px;
            border-radius: 8px;
            max-height: 280px;
            overflow-y: auto;
            margin-bottom: 15px;
            font-size: 14px;
            touch-action: pan-y;
            -webkit-overflow-scrolling: touch;
        }
        .preview-card {
            border-bottom: 1px solid var(--border-color);
            padding: 12px 4px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .preview-word-title {
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
        .input-with-clear {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
        }
        .preview-edit-input {
            flex: 1;
            font-size: 14px;
            padding: 10px;
            margin-bottom: 0;
            border-radius: 6px;
            user-select: text;
            -webkit-user-select: text;
        }
        .clear-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--sub-color);
            padding: 9px 12px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            touch-action: manipulation;
        }
        .clear-btn:active {
            opacity: 0.5;
        }
        .definition-tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 2px;
        }
        .def-badge {
            background-color: var(--badge-bg);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            max-width: 100%;
            text-align: left;
            word-break: break-all;
            white-space: normal;
            touch-action: manipulation;
        }
        .def-badge:active {
            opacity: 0.6;
        }
        .inline-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .inline-row input {
            margin-bottom: 0;
            flex: 1;
        }
        .inline-row button {
            flex: none;
            padding: 0 20px;
            border-radius: 4px;
        }
        .quiz-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="toast" id="toastNotice">提示</div>
    <div class="nav-bar">
        <div class="nav-left">
            <button class="nav-btn" id="currentListNameBtn" onclick="openModal('listsModal')">選擇單字包</button>
            <button class="nav-btn" onclick="openModal('importModal')">匯入</button>
            <button class="nav-btn" onclick="startQuiz()">測驗</button>
        </div>
        <div class="nav-right">
            <button class="nav-btn" id="themeBtn" onclick="toggleTheme()">深色模式</button>
        </div>
    </div>
    
    <div class="stage-container" id="stageContainer">
        <div class="space3d" id="space3d"></div>
    </div>

    <div class="focus-overlay" id="focusOverlay">
        <div class="focus-word" id="focusWord">Word</div>
        <div class="focus-trans" id="focusTrans" onclick="revealTranslation()">點擊顯示翻譯</div>
        <div class="action-group">
            <button class="action-btn" onclick="markLearned(true)">記住了</button>
            <button class="action-btn" onclick="markLearned(false)">還沒記住</button>
        </div>
        <div class="switch-word-group">
            <button class="arrow-btn" onclick="switchFocusAdjacent(-1)">← 上一個</button>
            <button class="action-btn" style="border:none; padding:12px 20px;" onclick="closeFocus()">返回筒中</button>
            <button class="arrow-btn" onclick="switchFocusAdjacent(1)">下一個 →</button>
        </div>
    </div>

    <div class="modal" id="listsModal">
        <div class="modal-title">我的單字包</div>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" id="newListNameInput" placeholder="輸入新單字表名稱..." style="margin-bottom:0;">
            <button class="action-btn" onclick="createNewList()">創立</button>
        </div>
        <div id="listsContainer" style="max-height: 400px; overflow-y: auto;"></div>
        <button class="action-btn" style="width:100%; margin-top:20px; background-color: var(--text-color); color: var(--bg-color);" onclick="closeModal('listsModal')">確認應用選取</button>
        <button class="nav-btn" style="margin-top:10px; padding: 15px;" onclick="closeModal('listsModal')">關閉</button>
    </div>

    <div class="modal" id="importModal">
        <div class="modal-title">自動一字多義中文化匯入</div>
        <p style="font-size: 13px; color: var(--sub-color); margin-bottom: 8px; text-align: center;">目的地單字表：</p>
        <select id="importTargetSelect"></select>
        
        <div class="inline-row">
            <input type="text" id="singleWordInput" placeholder="單獨丟入單字快捷查詢 (例如: hello)">
            <button class="action-btn" onclick="addSingleWordStream()">丟入</button>
        </div>

        <p style="font-size: 12px; color: var(--sub-color); margin-bottom: 6px;">或整批輸入（一行一個）：</p>
        <textarea id="importInput" placeholder="apple&#10;banana&#10;serendipity 美好的巧合"></textarea>
        <button id="startQueryBtn" class="action-btn" style="width:100%; margin-bottom:15px;" onclick="fetchTranslationsOnlineStream()">開始批量流式查詢</button>
        
        <div id="queryPreviewSection" style="display:none;">
            <p style="margin-bottom:8px; font-weight: 500; font-size:14px;">即時查詞預覽（可點擊中文標籤組合、或右側 ❌ 清空手寫）：</p>
            <div class="preview-box" id="previewBox"></div>
            <button class="action-btn" style="width:100%; margin-top:10px; background-color: var(--text-color); color: var(--bg-color);" onclick="saveImportedWordsOnline()">確認無誤，匯入筒中</button>
        </div>
        <button class="nav-btn" style="margin-top:10px; padding: 10px;" onclick="closeImportModal()">取消退出</button>
    </div>

    <div class="modal" id="quizModal">
        <div class="modal-title">自我測驗</div>
        <div class="quiz-container" id="quizContainer"></div>
        <button class="nav-btn" style="margin-top:auto; padding: 15px;" onclick="closeModal('quizModal')">結束測驗</button>
    </div>

    <script>
        const defaultPackage = {
            currentListIds: ['list_default'],
            lists: {
                'list_default': {
                    name: '初始單字表',
                    words: [
                        { id: 1, word: 'serendipity', trans: ['不期而遇的美好'], wrongCount: 2, lastReviewed: Date.now() - 900000000 },
                        { id: 2, word: 'apple', trans: ['蘋果'], wrongCount: 0, lastReviewed: Date.now() }
                    ]
                }
            }
        };

        let appData = JSON.parse(localStorage.getItem('vocab_cylinder_data')) || defaultPackage;
        if (!Array.isArray(appData.currentListIds)) {
            appData.currentListIds = ['list_default'];
        }

        let currentFocusIndex = -1;
        let onlineImportList = [];
        let rotX = 0, rotY = 0;
        let isDragging = false;
        let dragMoved = false;
        let startX, startY;
        let initialPinchDist = null;
        let fov = 400; 

        function getCombinedWords() {
            let combined = [];
            appData.currentListIds.forEach(id => {
                if (appData.lists[id]) {
                    appData.lists[id].words.forEach(w => {
                        combined.push({ ...w, originListId: id });
                    });
                }
            });
            return combined;
        }

        window.onload = function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? '淺色模式' : '深色模式';
            updateNavBarTitle();
            renderCylinderSpace();
            init3DControl();
            updateSpaceTransform();
        };

        function showToast(msg) {
            const toast = document.getElementById('toastNotice');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1200);
        }

        function saveToStorage() {
            localStorage.setItem('vocab_cylinder_data', JSON.stringify(appData));
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('themeBtn').innerText = newTheme === 'dark' ? '淺色模式' : '深色模式';
        }

        function updateNavBarTitle() {
            if (appData.currentListIds.length === 1) {
                const id = appData.currentListIds[0];
                document.getElementById('currentListNameBtn').innerText = appData.lists[id] ? appData.lists[id].name : '選擇單字表';
            } else {
                document.getElementById('currentListNameBtn').innerText = `已選 ${appData.currentListIds.length} 個單字包`;
            }
        }

        function renderCylinderSpace() {
            const space = document.getElementById('space3d');
            space.innerHTML = '';
            const wordsArr = getCombinedWords();
            if (wordsArr.length === 0) {
                space.innerHTML = `<div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:var(--sub-color); font-size:14px; text-align:center; width:80%;">目前無選取單字包或包內空空的，請點選「匯入」或更改單字包勾選</div>`;
                return;
            }

            const totalWords = wordsArr.length;
            const wordsPerLayer = totalWords > 12 ? 10 : totalWords;
            const heightStep = 110; 
            const radius = 600; 

            wordsArr.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.setAttribute('data-index', index);

                const layer = Math.floor(index / wordsPerLayer); 
                const totalLayers = Math.ceil(totalWords / wordsPerLayer);
                const layerIndex = index % wordsPerLayer; 

                const theta = (layerIndex / wordsPerLayer) * 2 * Math.PI;

                const x = radius * Math.sin(theta);
                const z = radius * Math.cos(theta);
                const y = (layer - (totalLayers - 1) / 2) * heightStep;

                const daysUnreviewed = (Date.now() - item.lastReviewed) / (1000 * 60 * 60 * 24);
                let sizeScale = daysUnreviewed > 3 ? 1.35 : 1;
                
                card.dataset.x = x;
                card.dataset.y = y;
                card.dataset.z = z;
                card.dataset.scale = sizeScale;

                const textSpan = document.createElement('span');
                textSpan.className = 'word-text';
                textSpan.innerText = item.word;

                if(item.wrongCount > 0) {
                    const dot = document.createElement('div');
                    dot.className = 'wrong-dot';
                    dot.style.display = 'block';
                    const dotSize = Math.min(5 + item.wrongCount * 1.5, 13);
                    dot.style.width = dotSize + 'px';
                    dot.style.height = dotSize + 'px';
                    dot.style.top = `-${dotSize/2}px`;
                    dot.style.right = `-${dotSize}px`;
                    textSpan.appendChild(dot);
                }
                card.appendChild(textSpan);
                card.addEventListener('pointerup', (e) => {
                    if (dragMoved) return;
                    e.stopPropagation();
                    openFocus(index);
                });
                space.appendChild(card);
            });
            updateBillboards();
        }

        function updateBillboards() {
            const cards = document.querySelectorAll('.word-card');
            cards.forEach(card => {
                const x = card.dataset.x;
                const y = card.dataset.y;
                const z = card.dataset.z;
                const scale = card.dataset.scale;
                card.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateY(${rotY - 180}deg) rotateX(${-rotX}deg) scale(${scale})`;
            });
        }

        function updateSpaceTransform() {
            document.getElementById('stageContainer').style.perspective = `${fov}px`;
            document.getElementById('space3d').style.transform = `translateZ(0px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        }

        function init3DControl() {
            const container = document.getElementById('stageContainer');
            container.addEventListener('pointerdown', (e) => {
                isDragging = true;
                dragMoved = false;
                startX = e.clientX;
                startY = e.clientY;
                container.setPointerCapture(e.pointerId);
            });
            container.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                if (Math.abs(dx) > 4 || Math.abs(dy) > 4) dragMoved = true;
                rotY += dx * 0.25;
                rotX -= dy * 0.25;
                rotX = Math.max(-45, Math.min(45, rotX)); 
                startX = e.clientX;
                startY = e.clientY;
                updateSpaceTransform();
                updateBillboards();
            });
            container.addEventListener('pointerup', (e) => {
                isDragging = false;
                container.releasePointerCapture(e.pointerId);
            });
        }

        function openFocus(index) {
            const wordsArr = getCombinedWords();
            if(!wordsArr[index]) return;
            currentFocusIndex = index;
            const item = wordsArr[index];
            document.getElementById('focusWord').innerText = item.word;
            document.getElementById('focusTrans').innerText = '點擊顯示翻譯';
            document.getElementById('focusOverlay').classList.add('active');
        }

        function revealTranslation() {
            const wordsArr = getCombinedWords();
            const item = wordsArr[currentFocusIndex];
            if(item) {
                document.getElementById('focusTrans').innerText = item.trans.join(', ');
            }
        }

        function closeFocus() {
            document.getElementById('focusOverlay').classList.remove('active');
            renderCylinderSpace(); 
        }

        function switchFocusAdjacent(dir) {
            const wordsArr = getCombinedWords();
            if (wordsArr.length === 0) return;
            let newIndex = currentFocusIndex + dir;
            if (newIndex < 0) newIndex = wordsArr.length - 1;
            if (newIndex >= wordsArr.length) newIndex = 0;
            openFocus(newIndex);
        }

        function markLearned(isLearned) {
            const wordsArr = getCombinedWords();
            const focusedWord = wordsArr[currentFocusIndex];
            if (!focusedWord) return;

            const targetList = appData.lists[focusedWord.originListId];
            if (targetList) {
                const wordInData = targetList.words.find(w => w.id === focusedWord.id);
                if (wordInData) {
                    if (isLearned) {
                        wordInData.wrongCount = Math.max(0, wordInData.wrongCount - 1);
                        showToast('記住了！錯誤標記減少');
                    } else {
                        wordInData.wrongCount += 1;
                        showToast('已記錄，加強複習點點');
                    }
                    wordInData.lastReviewed = Date.now();
                    saveToStorage();
                }
            }
            switchFocusAdjacent(1);
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
            if (id === 'listsModal') renderListsManager();
            if (id === 'importModal') {
                prepareImportTargetSelect();
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
            renderCylinderSpace();
        }

        function renderListsManager() {
            const container = document.getElementById('listsContainer');
            container.innerHTML = '';
            Object.keys(appData.lists).forEach(id => {
                const list = appData.lists[id];
                const checked = appData.currentListIds.includes(id) ? 'checked' : '';
                const row = document.createElement('div');
                row.innerHTML = `
                    <label style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <input type="checkbox" value="${id}" ${checked} onchange="toggleListSelection('${id}')">
                        <span>${list.name} (${list.words.length})</span>
                    </label>
                `;
                container.appendChild(row);
            });
        }

        function prepareImportTargetSelect() {
            const select = document.getElementById('importTargetSelect');
            select.innerHTML = '';
            Object.keys(appData.lists).forEach(id => {
                select.innerHTML += `<option value="${id}">${appData.lists[id].name}</option>`;
            });
        }

        // 使用免費翻譯網關將英文轉為繁體中文
        async function translateToChinese(text) {
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(text)}`);
                if(res.ok) {
                    const data = await res.json();
                    return data[0].map(item => item[0]).join('');
                }
            } catch(e) {
                console.error("翻譯出錯", e);
            }
            return text;
        }

        // 單獨丟入快捷查詢
        async function addSingleWordStream() {
            const inputEl = document.getElementById('singleWordInput');
            const word = inputEl.value.trim();
            if(!word) return;
            inputEl.value = '';

            document.getElementById('queryPreviewSection').style.display = 'block';
            await processSingleWordItem(word, "", onlineImportList.length);
        }

        // 批量流式分步上架
        async function fetchTranslationsOnlineStream() {
            const btn = document.getElementById('startQueryBtn');
            btn.innerText = '正在聯網自動一字多義查詞中...';
            btn.disabled = true;

            const input = document.getElementById('importInput').value;
            const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            if(lines.length === 0) {
                btn.innerText = '開始批量流式查詢';
                btn.disabled = false;
                return;
            }

            document.getElementById('queryPreviewSection').style.display = 'block';

            for (let i = 0; i < lines.length; i++) {
                const parts = lines[i].split(/\s+/);
                const word = parts[0];
                let userTrans = parts.slice(1).join(' ');
                
                processSingleWordItem(word, userTrans, onlineImportList.length);
            }

            btn.innerText = '開始批量流式查詢';
            btn.disabled = false;
        }

        // 處理單個單字節點
        async function processSingleWordItem(word, userTrans, localIndex) {
            const previewBox = document.getElementById('previewBox');
            const card = document.createElement('div');
            card.className = 'preview-card';
            card.id = `preview_card_${localIndex}`;
            card.innerHTML = `
                <div class="preview-header">
                    <span class="preview-word-title">${word}</span>
                    <span style="font-size:12px; color:var(--sub-color);">查詢中...</span>
                </div>
                <div class="input-with-clear">
                    <input type="text" class="preview-edit-input" id="pre_in_${localIndex}" value="讀取中...">
                    <button type="button" class="clear-btn" onclick="clearPreviewInput(${localIndex})">❌ 清除</button>
                </div>
                <div class="definition-tags-container" id="tags_container_${localIndex}"></div>
            `;
            previewBox.appendChild(card);
            previewBox.scrollTop = previewBox.scrollHeight;

            let candidates = [];
            
            if (userTrans) {
                candidates.push(userTrans);
            } else {
                try {
                    const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
                    if (response.ok) {
                        const data = await response.json();
                        if (data && data[0] && data[0].meanings) {
                            for (const m of data[0].meanings) {
                                const pos = m.partOfSpeech;
                                const posZh = await translateToChinese(pos);
                                if (m.definitions) {
                                    for (const d of m.definitions.slice(0, 2)) {
                                        const translatedDef = await translateToChinese(d.definition);
                                        candidates.push(`[${posZh}] ${translatedDef}`);
                                    }
                                }
                            }
                        }
                    }
                } catch (err) {
                    console.error('API 查詢失敗', err);
                }
            }

            if (candidates.length === 0) {
                candidates.push('[暫無內建釋義，可在此手打加字]');
            }

            const itemObj = {
                id: Date.now() + localIndex,
                word: word,
                allCandidates: candidates,
                defaultText: candidates[0] || ''
            };
            onlineImportList[localIndex] = itemObj;

            const inputEl = document.getElementById(`pre_in_${localIndex}`);
            inputEl.value = itemObj.defaultText;
            
            const headerEl = card.querySelector('.preview-header');
            headerEl.innerHTML = `<span class="preview-word-title">${word}</span>`;

            const tagsContainer = document.getElementById(`tags_container_${localIndex}`);
            tagsContainer.innerHTML = '';

            itemObj.allCandidates.forEach(cand => {
                const badge = document.createElement('button');
                badge.type = 'button';
                badge.className = 'def-badge';
                badge.innerText = cand;
                badge.onclick = () => {
                    const curVal = inputEl.value.trim();
                    // 如果原本是提示字、預設字或空白，點擊時直接取代，不再錯誤串接
                    if (curVal === '' || curVal.startsWith('[暫無內建') || curVal === '讀取中...' || curVal === itemObj.allCandidates[0]) {
                        inputEl.value = cand;
                    } else {
                        inputEl.value = curVal + ', ' + cand;
                    }
                };
                tagsContainer.appendChild(badge);
            });

            if (itemObj.allCandidates.length > 1) {
                const selectAllBtn = document.createElement('button');
                selectAllBtn.type = 'button';
                selectAllBtn.className = 'def-badge';
                selectAllBtn.style.border = '1px dashed var(--text-color)';
                selectAllBtn.innerText = '➕ 全選打包';
                selectAllBtn.onclick = () => {
                    inputEl.value = itemObj.allCandidates.join(', ');
                };
                tagsContainer.appendChild(selectAllBtn);
            }
        }

        // 新增：清除按鈕的獨立觸發事件
        function clearPreviewInput(index) {
            const inputEl = document.getElementById(`pre_in_${index}`);
            if (inputEl) {
                inputEl.value = '';
                inputEl.focus();
            }
        }

        function saveImportedWordsOnline() {
            const targetId = document.getElementById('importTargetSelect').value;
            if(!appData.lists[targetId]) return;

            onlineImportList.forEach((item, index) => {
                if(!item) return; 
                const inputEl = document.getElementById(`pre_in_${index}`);
                const editVal = inputEl ? inputEl.value.trim() : item.defaultText;
                appData.lists[targetId].words.push({
                    id: item.id,
                    word: item.word,
                    trans: [editVal || '暫無翻譯'],
                    wrongCount: 0,
                    lastReviewed: Date.now()
                });
            });

            saveToStorage();
            showToast(`成功匯入新增單字`);
            closeImportModal();
        }

        function closeImportModal() {
            document.getElementById('importInput').value = '';
            document.getElementById('singleWordInput').value = '';
            document.getElementById('previewBox').innerHTML = '';
            document.getElementById('queryPreviewSection').style.display = 'none';
            onlineImportList = [];
            closeModal('importModal');
        }

        let quizPool = [];
        let currentQuizIndex = 0;
        function startQuiz() {
            const wordsArr = getCombinedWords();
            if (wordsArr.length < 4) {
                showToast('單字庫總數不足 4 個，無法生成測驗');
                return;
            }
            quizPool = [...wordsArr].sort(() => 0.5 - Math.random()).slice(0, 5); 
            currentQuizIndex = 0;
            openModal('quizModal');
            nextQuizQuestion();
        }

        function nextQuizQuestion() {
            const container = document.getElementById('quizContainer');
            container.innerHTML = '';
            if (currentQuizIndex >= quizPool.length) {
                container.innerHTML = `<div style="font-size:24px;">🎉 測驗結束！</div>`;
                return;
            }
            const currentQuestion = quizPool[currentQuizIndex];
            const allWords = getCombinedWords();
            let options = [currentQuestion.trans.join(', ')];
            while (options.length < 4) {
                const randomWord = allWords[Math.floor(Math.random() * allWords.length)];
                const transStr = randomWord.trans.join(', ');
                if (!options.includes(transStr)) options.push(transStr);
            }
            options.sort(() => 0.5 - Math.random());

            const qDiv = document.createElement('div');
            qDiv.style.fontSize = "32px";
            qDiv.style.marginBottom = "20px";
            qDiv.innerText = currentQuestion.word;
            container.appendChild(qDiv);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.style.width = "100%";
                btn.style.padding = "12px";
                btn.style.marginBottom = "8px";
                btn.innerText = opt;
                btn.onclick = () => {
                    if (opt === currentQuestion.trans.join(', ')) showToast('答對了！👍');
                    else showToast('答錯了！💡');
                    currentQuizIndex++;
                    setTimeout(nextQuizQuestion, 800);
                };
                container.appendChild(btn);
            });
        }
    </script>
</body>
</html>
