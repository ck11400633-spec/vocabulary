<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Minimalist Vocab - Universal Fix</title>
    <style>
        :root {
            --bg-color: #1C1C1E;
            --text-color: #E5E5EA;
            --sub-color: #8E8E93;
            --border-color: #2C2C2E;
            --overlay-bg: rgba(28,28,30,0.96);
            --dot-color: #FFFFFF;
            --toast-bg: rgba(255,255,255,0.1);
        }
        [data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #111111;
            --sub-color: #888888;
            --border-color: #eeeeee;
            --overlay-bg: rgba(255,255,255,0.96);
            --dot-color: #111111;
            --toast-bg: rgba(0,0,0,0.05);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            padding-top: env(safe-area-inset-top);
            transition: background-color 0.3s, color 0.3s;
        }
        .nav-bar {
            position: absolute;
            top: 25px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .nav-left, .nav-right {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .nav-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 16px;
            cursor: pointer;
            padding: 12px 14px;
            letter-spacing: 1px;
            opacity: 0.8;
            transition: opacity 0.2s;
            touch-action: manipulation;
        }
        .nav-btn:hover {
            opacity: 0.5;
        }
        #currentListNameBtn {
            font-weight: 500;
            border-bottom: 1px dashed var(--text-color);
            padding-bottom: 2px;
        }
        .stage-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            position: relative;
            transition: opacity 0.4s ease, filter 0.4s ease; /* 讓背景淡化更平滑 */
        }
        .stage-container:active {
            cursor: grabbing;
        }
        /* 當其他頁面打開時，用於弱化單字海視覺與干擾的樣式 */
        .stage-container.blur-out {
            opacity: 0.15;
            filter: blur(4px);
            pointer-events: none; /* 雙重保險，完全禁止任何單字卡點擊 */
        }
        .space3d {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .word-card {
            position: absolute;
            left: 50%;
            top: 50%;
            cursor: pointer;
            white-space: nowrap;
            padding: 20px; 
            transform-origin: center center;
            will-change: transform, opacity;
        }
        .word-text {
            font-size: 24px; 
            font-weight: 300;
            letter-spacing: 0.5px;
            position: relative;
            display: inline-block;
            pointer-events: none;
        }
        .wrong-dot {
            position: absolute;
            background-color: var(--dot-color);
            border-radius: 50%;
            display: none;
        }
        .focus-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .focus-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .focus-word {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-align: center;
        }
        .focus-trans {
            font-size: 20px;
            color: var(--sub-color);
            margin-bottom: 35px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 400;
            cursor: pointer;
            text-align: center;
            padding: 0 20px;
            touch-action: manipulation;
        }
        .action-group {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }
        .action-btn {
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 12px 26px;
            font-size: 15px;
            cursor: pointer;
            border-radius: 24px;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .action-btn:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
        .switch-word-group {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        .arrow-btn {
            background: none;
            border: none;
            color: var(--sub-color);
            font-size: 16px;
            cursor: pointer;
            padding: 15px;
            touch-action: manipulation;
        }
        .arrow-btn:hover {
            color: var(--text-color);
        }
        .toast {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toast-bg);
            color: var(--text-color);
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 400;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 300;
            display: flex;
            flex-direction: column;
            padding: 60px 25px 40px 25px;
            overflow-y: auto;
            display: none;
            touch-action: pan-y;
        }
        .modal.active {
            display: flex;
        }
        .modal-title {
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 25px;
            text-align: center;
        }
        textarea, input[type="text"], select {
            width: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 14px;
            font-size: 16px;
            outline: none;
            margin-bottom: 15px;
            -webkit-appearance: none;
            touch-action: manipulation;
        }
        textarea {
            height: 150px;
            resize: none;
            user-select: text;
            -webkit-user-select: text;
        }
        .list-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .list-item-row:hover {
            background-color: var(--border-color);
        }
        .list-checkbox-label {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            cursor: pointer;
            font-size: 16px;
        }
        .list-checkbox-label input {
            width: 20px;
            height: 20px;
        }
        .list-actions {
            display: flex;
            gap: 12px;
        }
        .sm-btn {
            font-size: 14px;
            color: var(--sub-color);
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 4px;
            touch-action: manipulation;
        }
        .preview-box {
            border: 1px dashed var(--border-color);
            padding: 15px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .preview-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
            gap: 15px;
        }
        .preview-edit-input {
            flex: 1;
            max-width: 200px;
            font-size: 14px;
            padding: 6px 8px;
            margin-bottom: 0;
            border-radius: 4px;
            user-select: text;
            -webkit-user-select: text;
        }
        .quiz-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
        }
        .quiz-q {
            font-size: 38px;
            font-weight: 300;
            margin-bottom: 40px;
            text-align: center;
        }
        .quiz-options {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .quiz-opt-btn {
            width: 100%;
            padding: 16px;
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            border-radius: 8px;
            touch-action: manipulation;
        }
        .quiz-opt-btn:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
    </style>
</head>
<body>
    <div class="toast" id="toastNotice">提示</div>
    <div class="nav-bar">
        <div class="nav-left">
            <button class="nav-btn" id="currentListNameBtn" onclick="openModal('listsModal')">選擇單字包</button>
            <button class="nav-btn" onclick="openModal('importModal')">匯入</button>
            <button class="nav-btn" onclick="startQuiz()">測驗</button>
        </div>
        <div class="nav-right">
            <button class="nav-btn" id="themeBtn" onclick="toggleTheme()">切換至淺色模式</button>
        </div>
    </div>
    
    <div class="stage-container" id="stageContainer">
        <div class="space3d" id="space3d"></div>
    </div>

    <div class="focus-overlay" id="focusOverlay">
        <div class="focus-word" id="focusWord">Word</div>
        <div class="focus-trans" id="focusTrans" onclick="revealTranslation()">點擊顯示翻譯</div>
        <div class="action-group">
            <button class="action-btn" onclick="markLearned(true)">記住了</button>
            <button class="action-btn" onclick="markLearned(false)">還沒記住</button>
        </div>
        <div class="switch-word-group">
            <button class="arrow-btn" onclick="switchFocusAdjacent(-1)">← 上一個</button>
            <button class="action-btn" style="border:none; padding:12px 20px;" onclick="closeFocus()">返回筒中</button>
            <button class="arrow-btn" onclick="switchFocusAdjacent(1)">下一個 →</button>
        </div>
    </div>

    <div class="modal" id="listsModal">
        <div class="modal-title">我的單字包</div>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" id="newListNameInput" placeholder="輸入新單字表名稱..." style="margin-bottom:0;">
            <button class="action-btn" onclick="createNewList()">創立</button>
        </div>
        <div id="listsContainer" style="max-height: 400px; overflow-y: auto;"></div>
        <button class="action-btn" style="width:100%; margin-top:20px; background-color: var(--text-color); color: var(--bg-color);" onclick="closeModal('listsModal')">確認應用選取</button>
        <button class="nav-btn" style="margin-top:10px; padding: 15px;" onclick="closeModal('listsModal')">關閉</button>
    </div>

    <div class="modal" id="importModal">
        <div class="modal-title">自動查詞匯入</div>
        <p style="font-size: 13px; color: var(--sub-color); margin-bottom: 10px; text-align: center;">請選擇要匯入的目的地：</p>
        <select id="importTargetSelect"></select>
        <p style="font-size: 13px; color: var(--sub-color); margin-bottom: 10px; text-align: center;">請輸入單字（一行一個）。支援直接帶有翻譯，例如：apple 蘋果</p>
        <textarea id="importInput" placeholder="apple 蘋果&#10;banana 香蕉&#10;serendipity 不期而遇的美好&#10;ephemeral"></textarea>
        <button id="startQueryBtn" class="action-btn" style="width:100%; margin-bottom:20px;" onclick="fetchTranslationsOnline()">開始自動查詢與解析</button>
        
        <div id="queryPreviewSection" style="display:none; flex: 1; display: flex; flex-direction: column;">
            <p style="margin-bottom:10px; font-weight: 500;">字典查詢預覽（可在下方框內直接修改翻譯）：</p>
            <div class="preview-box" id="previewBox"></div>
            <button class="action-btn" style="width:100%; margin-top:10px; background-color: var(--text-color); color: var(--bg-color);" onclick="saveImportedWordsOnline()">確認無誤，匯入筒中</button>
        </div>
        <button class="nav-btn" style="margin-top:auto; padding: 15px;" onclick="closeImportModal()">取消退出</button>
    </div>

    <div class="modal" id="quizModal">
        <div class="modal-title">自我測驗</div>
        <div class="quiz-container" id="quizContainer"></div>
        <button class="nav-btn" style="margin-top:auto; padding: 15px;" onclick="closeModal('quizModal')">結束測驗</button>
    </div>

    <script>
        const defaultPackage = {
            currentListIds: ['list_default'],
            lists: {
                'list_default': {
                    name: '初始單字表',
                    words: [
                        { id: 1, word: 'serendipity', trans: ['不期而遇的美好'], wrongCount: 2, lastReviewed: Date.now() - 900000000 },
                        { id: 2, word: 'こもれび', trans: ['從樹葉縫隙漏下來的陽光'], wrongCount: 0, lastReviewed: Date.now() },
                        { id: 3, word: 'ephemeral', trans: ['轉瞬即逝的'], wrongCount: 4, lastReviewed: Date.now() - 500000000 },
                        { id: 4, word: 'しんりんよく', trans: ['森林浴'], wrongCount: 1, lastReviewed: Date.now() },
                        { id: 5, word: 'wanderlust', trans: ['漫遊癖'], wrongCount: 0, lastReviewed: Date.now() },
                        { id: 6, word: 'nefarious', trans: ['邪惡的'], wrongCount: 3, lastReviewed: Date.now() - 600000000 },
                        { id: 7, word: 'sonder', trans: ['意識到每個人都有其獨特的生活'], wrongCount: 1, lastReviewed: Date.now() },
                        { id: 8, word: 'solitude', trans: ['獨處'], wrongCount: 0, lastReviewed: Date.now() },
                        { id: 9, word: 'melancholy', trans: ['憂鬱'], wrongCount: 0, lastReviewed: Date.now() },
                        { id: 10, word: 'luminous', trans: ['發光的'], wrongCount: 2, lastReviewed: Date.now() }
                    ]
                }
            }
        };

        let appData = JSON.parse(localStorage.getItem('vocab_cylinder_data')) || defaultPackage;
        if (!Array.isArray(appData.currentListIds)) {
            appData.currentListIds = ['list_default'];
        }

        let currentFocusIndex = -1;
        let onlineImportList = [];
        
        let rotX = 0, rotY = 0;
        let dynamicRadius = 380; 
        const CAMERA_FOCAL = 400; 

        const MIN_USER_Z = -500; 
        const MAX_USER_Z = -100; 
        let userZ = MAX_USER_Z;   

        let autoRotSpeedY = 0.04; 
        let vx = 0, vy = 0; 
        
        let isDragging = false;
        let startX, startY;
        let lastTime, lastX, lastY; 
        let startPinchZ = 0;
        let startTouchDist = 0;
        let animationFrameId = null;

        let totalDragDistance = 0;

        // 檢查目前畫面上是否有任何彈出視窗（Modal）或是單字聚焦卡（Focus Overlay）處於開啟狀態
        function isAnyOverlayOpen() {
            return document.querySelector('.modal.active') !== null || 
                   document.getElementById('focusOverlay').classList.includes('active');
        }

        function getCombinedWords() {
            let combined = [];
            appData.currentListIds.forEach(id => {
                if (appData.lists[id]) {
                    appData.lists[id].words.forEach(w => {
                        combined.push({ ...w, originListId: id });
                    });
                }
            });
            return combined;
        }

        window.onload = function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? '切換至淺色模式' : '切換至深色模式';
            
            updateNavBarTitle();
            renderCylinderSpace();
            init3DControl();
            startRenderLoop();
        };

        function showToast(msg) {
            const toast = document.getElementById('toastNotice');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1200);
        }

        function saveToStorage() {
            localStorage.setItem('vocab_cylinder_data', JSON.stringify(appData));
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('themeBtn').innerText = newTheme === 'dark' ? '切換至淺色模式' : '切換至深色模式';
        }

        function updateNavBarTitle() {
            if (appData.currentListIds.length === 1) {
                const id = appData.currentListIds[0];
                document.getElementById('currentListNameBtn').innerText = appData.lists[id] ? appData.lists[id].name : '選擇單字表';
            } else {
                document.getElementById('currentListNameBtn').innerText = `已選 ${appData.currentListIds.length} 個單字包`;
            }
        }

        function renderCylinderSpace() {
            const space = document.getElementById('space3d');
            space.innerHTML = '';
            const wordsArr = getCombinedWords();
            if (wordsArr.length === 0) {
                space.innerHTML = `<div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:var(--sub-color); font-size:14px; text-align:center; width:80%;">目前無選取單字包或包內空空的</div>`;
                return;
            }

            const totalWords = wordsArr.length;
            dynamicRadius = 380 + (totalWords * 4);
            dynamicRadius = Math.max(380, Math.min(1000, dynamicRadius));

            const wordsPerLayer = dynamicRadius > 500 ? 12 : 8;
            const heightStep = 110; 

            wordsArr.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.setAttribute('data-index', index);

                const layer = Math.floor(index / wordsPerLayer);
                const totalLayers = Math.ceil(totalWords / wordsPerLayer);
                const layerIndex = index % wordsPerLayer;

                const randomAngleOffset = (Math.random() - 0.5) * (2 * Math.PI / wordsPerLayer) * 0.7;
                const randomHeightOffset = (Math.random() - 0.5) * heightStep * 0.6;

                const theta = ((layerIndex / wordsPerLayer) * 2 * Math.PI) + randomAngleOffset;
                const origX = dynamicRadius * Math.sin(theta);
                const origZ = dynamicRadius * Math.cos(theta);
                const origY = ((layer - (totalLayers - 1) / 2) * heightStep) + randomHeightOffset;

                card.dataset.origX = origX;
                card.dataset.origY = origY;
                card.dataset.origZ = origZ;

                const daysUnreviewed = (Date.now() - item.lastReviewed) / (1000 * 60 * 60 * 24);
                card.dataset.baseScale = daysUnreviewed > 3 ? 1.35 : 1;

                const textSpan = document.createElement('span');
                textSpan.className = 'word-text';
                textSpan.innerText = item.word;

                if(item.wrongCount > 0) {
                    const dot = document.createElement('div');
                    dot.className = 'wrong-dot';
                    dot.style.display = 'block';
                    const dotSize = Math.min(5 + item.wrongCount * 1.5, 13);
                    dot.style.width = dotSize + 'px';
                    dot.style.height = dotSize + 'px';
                    dot.style.top = `-${dotSize/2}px`;
                    dot.style.right = `-${dotSize}px`;
                    textSpan.appendChild(dot);
                }
                card.appendChild(textSpan);
                
                card.addEventListener('click', (e) => {
                    // 如果有視窗開啟，直接拒絕任何點擊卡片行為
                    if (document.querySelector('.modal.active')) return;
                    
                    if (totalDragDistance < 8) {
                        e.stopPropagation(); 
                        vx = 0;
                        vy = 0;
                        openFocus(index);
                    }
                });

                space.appendChild(card);
            });
        }

        function updatePseudo3DProjection() {
            const cards = document.querySelectorAll('.word-card');
            if (cards.length === 0) return;

            const radX = (rotX * Math.PI) / 180;
            const radY = (rotY * Math.PI) / 180;

            const cosX = Math.cos(radX), sinX = Math.sin(radX);
            const cosY = Math.cos(radY), sinY = Math.sin(radY);

            cards.forEach(card => {
                let x = parseFloat(card.dataset.origX);
                let y = parseFloat(card.dataset.origY);
                let z = parseFloat(card.dataset.origZ);

                let x1 = x * cosY - z * sinY;
                let z1 = x * sinY + z * cosY;
                let y2 = y * cosX - z1 * sinX;
                let z2 = y * sinX + z1 * cosX;

                let finalZ = z2 + userZ;
                const viewDist = CAMERA_FOCAL + finalZ;
                
                if (viewDist <= 20) {
                    card.style.opacity = 0;
                    card.style.transform = `translate3d(0px, 0px, 0) scale(0)`;
                    return;
                }

                const projectionScale = CAMERA_FOCAL / viewDist;
                const screenX = x1 * projectionScale;
                const screenY = y2 * projectionScale;

                const distToCenter = Math.hypot(screenX, screenY);
                const centerFactor = Math.max(0, 1 - distToCenter / 250); 

                let focusMagnify = 1.0;
                if (finalZ < 200) {
                    focusMagnify = 1.0 + (centerFactor * 0.7);
                }

                const baseScale = parseFloat(card.dataset.baseScale);
                const finalScale = projectionScale * baseScale * focusMagnify;
                
                let opacity = projectionScale * (0.4 + centerFactor * 0.8);
                if (opacity > 1) opacity = 1; 
                if (viewDist < 100) opacity = (viewDist - 20) / 80; 

                card.style.opacity = opacity;
                card.style.zIndex = Math.floor(1000 - finalZ);
                card.style.transform = `translate3d(calc(-50% + ${screenX}px), calc(-50% + ${screenY}px), 0) scale(${finalScale})`;
            });
        }

        function startRenderLoop() {
            function loop() {
                if (!isDragging) {
                    rotY += autoRotSpeedY;
                    rotY += vy;
                    rotX += vx;
                    rotX = Math.max(-40, Math.min(40, rotX));
                }
                updatePseudo3DProjection();
                animationFrameId = requestAnimationFrame(loop);
            }
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            loop();
        }

        function init3DControl() {
            const container = document.getElementById('stageContainer');
            
            container.addEventListener('pointerdown', (e) => {
                // 優化：如果其他頁面（Modal）打開了，直接阻斷，無法拖曳
                if (document.querySelector('.modal.active')) return;
                
                if (e.pointerType === 'touch' && !e.isPrimary) return;

                isDragging = true;
                totalDragDistance = 0; 
                startX = e.clientX;
                startY = e.clientY;
                lastX = e.clientX;
                lastY = e.clientY;
                lastTime = performance.now();
                
                vx = 0;
                vy = 0;
                container.setPointerCapture(e.pointerId);
            });

            container.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                if (document.querySelector('.modal.active')) return; // 保險機制
                if (e.pointerType === 'touch' && startTouchDist > 0) return;

                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                
                totalDragDistance += Math.hypot(dx, dy); 

                rotY += dx * 0.25;
                rotX -= dy * 0.25;
                rotX = Math.max(-40, Math.min(40, rotX));

                const now = performance.now();
                const dt = now - lastTime;
                if (dt > 0) {
                    vy = ((e.clientX - lastX) / dt) * 1.5; 
                    vx = -((e.clientY - lastY) / dt) * 1.5; 
                }

                startX = e.clientX;
                startY = e.clientY;
                lastX = e.clientX;
                lastY = e.clientY;
                lastTime = now;
            });

            container.addEventListener('pointerup', (e) => {
                isDragging = false;
                container.releasePointerCapture(e.pointerId);
                if (performance.now() - lastTime > 100) {
                    vx = 0;
                    vy = 0;
                }
            });

            // 滑鼠滾輪縮放（其他頁面開啟時禁用）
            window.addEventListener('wheel', (e) => {
                if (document.querySelector('.modal.active')) return;
                userZ -= e.deltaY * 0.4;
                userZ = Math.max(MIN_USER_Z, Math.min(MAX_USER_Z, userZ));
            }, { passive: true });

            // 手機雙指縮放（其他頁面開啟時禁用）
            container.addEventListener('touchstart', (e) => {
                if (document.querySelector('.modal.active')) return;
                if (e.touches.length === 2) {
                    isDragging = false; 
                    startTouchDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    startPinchZ = userZ;
                }
            }, { passive: true });

            container.addEventListener('touchmove', (e) => {
                if (document.querySelector('.modal.active')) return;
                if (e.touches.length === 2 && startTouchDist > 0) {
                    const currentDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const deltaDist = currentDist - startTouchDist;
                    userZ = startPinchZ + deltaDist * 1.2;
                    userZ = Math.max(MIN_USER_Z, Math.min(MAX_USER_Z, userZ));
                }
            }, { passive: true });

            container.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) {
                    startTouchDist = 0;
                }
            });
        }

        function openFocus(index) {
            const wordsArr = getCombinedWords();
            if(!wordsArr[index]) return;
            currentFocusIndex = index;
            const item = wordsArr[index];
            document.getElementById('focusWord').innerText = item.word;
            document.getElementById('focusTrans').innerText = '點擊顯示翻譯';
            
            // 開啟焦點單字卡時，背景也套用淡化效果
            document.getElementById('stageContainer').classList.add('blur-out');
            document.getElementById('focusOverlay').classList.add('active');
        }

        function revealTranslation() {
            const wordsArr = getCombinedWords();
            const item = wordsArr[currentFocusIndex];
            if(item) {
                document.getElementById('focusTrans').innerText = item.trans.join(', ');
            }
        }

        function closeFocus() {
            document.getElementById('focusOverlay').classList.remove('active');
            // 還原背景單字海的視覺亮度
            document.getElementById('stageContainer').classList.remove('blur-out');
            renderCylinderSpace(); 
        }

        function switchFocusAdjacent(dir) {
            const wordsArr = getCombinedWords();
            if (wordsArr.length === 0) return;
            let newIndex = currentFocusIndex + dir;
            if (newIndex < 0) newIndex = wordsArr.length - 1;
            if (newIndex >= wordsArr.length) newIndex = 0;
            openFocus(newIndex);
        }

        function markLearned(isLearned) {
            const wordsArr = getCombinedWords();
            const focusedWord = wordsArr[currentFocusIndex];
            if (!focusedWord) return;

            const targetList = appData.lists[focusedWord.originListId];
            if (targetList) {
                const wordInData = targetList.words.find(w => w.id === focusedWord.id);
                if (wordInData) {
                    if (isLearned) {
                        wordInData.wrongCount = Math.max(0, wordInData.wrongCount - 1);
                        showToast('記住了！錯誤標記減少');
                    } else {
                        wordInData.wrongCount += 1;
                        showToast('已記錄，加強複習點點');
                    }
                    wordInData.lastReviewed = Date.now();
                    saveToStorage();
                }
            }
            switchFocusAdjacent(1);
        }

        function openModal(id) {
            // 開啟頁面時，將 3D 單字海容器加上淡化/模糊效果且阻斷 pointer-events
            document.getElementById('stageContainer').classList.add('blur-out');
            document.getElementById(id).classList.add('active');
            if (id === 'listsModal') renderListsManager();
            if (id === 'importModal') prepareImportTargetSelect();
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
            // 關閉頁面時，恢復背景單字海亮度
            document.getElementById('stageContainer').classList.remove('blur-out');
            renderCylinderSpace();
        }

        function renderListsManager() {
            const container = document.getElementById('listsContainer');
            container.innerHTML = '';
            Object.keys(appData.lists).forEach(id => {
                const list = appData.lists[id];
                const checked = appData.currentListIds.includes(id) ? 'checked' : '';
                
                const row = document.createElement('div');
                row.className = 'list-item-row';
                row.innerHTML = `
                    <label class="list-checkbox-label">
                        <input type="checkbox" value="${id}" ${checked} onchange="toggleListSelection('${id}')">
                        <span>${list.name} (${list.words.length})</span>
                    </label>
                    <div class="list-actions">
                        <button class="sm-btn" onclick="deleteList('${id}')">刪除</button>
                    </div>
                `;
                container.innerHTML += row.outerHTML;
            });
        }

        function toggleListSelection(id) {
            const idx = appData.currentListIds.indexOf(id);
            if (idx > -1) {
                if (appData.currentListIds.length > 1) appData.currentListIds.splice(idx, 1);
                else showToast('請至少保留一個單字表');
            } else {
                appData.currentListIds.push(id);
            }
            saveToStorage();
            updateNavBarTitle();
        }

        function createNewList() {
            const nameInput = document.getElementById('newListNameInput');
            const name = nameInput.value.trim();
            if (!name) return;
            const id = 'list_' + Date.now();
            appData.lists[id] = { name: name, words: [] };
            nameInput.value = '';
            saveToStorage();
            renderListsManager();
        }

        function deleteList(id) {
            if (Object.keys(appData.lists).length <= 1) {
                showToast('無法刪除唯一的單字表');
                return;
            }
            delete appData.lists[id];
            appData.currentListIds = appData.currentListIds.filter(cid => cid !== id);
            if (appData.currentListIds.length === 0) appData.currentListIds = [Object.keys(appData.lists)[0]];
            saveToStorage();
            updateNavBarTitle();
            renderListsManager();
        }

        function prepareImportTargetSelect() {
            const select = document.getElementById('importTargetSelect');
            select.innerHTML = '';
            Object.keys(appData.lists).forEach(id => {
                select.innerHTML += `<option value="${id}">${appData.lists[id].name}</option>`;
            });
        }

        function fetchTranslationsOnline() {
            const input = document.getElementById('importInput').value;
            const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            if(lines.length === 0) return;

            onlineImportList = lines.map((line, i) => {
                const parts = line.split(/\s+/);
                const word = parts[0];
                const trans = parts.slice(1).join(' ') || '暫無翻譯（點擊編輯）';
                return { id: Date.now() + i, word: word, trans: [trans] };
            });

            const previewBox = document.getElementById('previewBox');
            previewBox.innerHTML = '';
            onlineImportList.forEach((item, index) => {
                previewBox.innerHTML += `
                    <div class="preview-item">
                        <span>${item.word}</span>
                        <input type="text" class="preview-edit-input" value="${item.trans[0]}" id="pre_in_${index}">
                    </div>
                `;
            });
            document.getElementById('queryPreviewSection').style.display = 'flex';
        }

        function saveImportedWordsOnline() {
            const targetId = document.getElementById('importTargetSelect').value;
            if(!appData.lists[targetId]) return;

            onlineImportList.forEach((item, index) => {
                const editVal = document.getElementById(`pre_in_${index}`).value.trim();
                item.trans = [editVal];
                item.wrongCount = 0;
                item.lastReviewed = Date.now();
                appData.lists[targetId].words.push(item);
            });

            saveToStorage();
            showToast(`成功匯入 ${onlineImportList.length} 個單字`);
            closeImportModal();
        }

        function closeImportModal() {
            document.getElementById('importInput').value = '';
            document.getElementById('queryPreviewSection').style.display = 'none';
            closeModal('importModal');
        }

        let quizPool = [];
        let currentQuizIndex = 0;
        
        function startQuiz() {
            const wordsArr = getCombinedWords();
            if (wordsArr.length < 4) {
                showToast('單字庫總數不足 4 個，無法生成測驗題目選項');
                return;
            }
            quizPool = [...wordsArr].sort(() => 0.5 - Math.random()).slice(0, 5); 
            currentQuizIndex = 0;
            openModal('quizModal');
            nextQuizQuestion();
        }

        function nextQuizQuestion() {
            const container = document.getElementById('quizContainer');
            container.innerHTML = '';

            if (currentQuizIndex >= quizPool.length) {
                container.innerHTML = `<div class="quiz-q">🎉 測驗結束！</div>`;
                return;
            }

            const currentQuestion = quizPool[currentQuizIndex];
            const allWords = getCombinedWords();
            
            let options = [currentQuestion.trans.join(', ')];
            while (options.length < 4) {
                const randomWord = allWords[Math.floor(Math.random() * allWords.length)];
                const transStr = randomWord.trans.join(', ');
                if (!options.includes(transStr)) {
                    options.push(transStr);
                }
            }
            options.sort(() => 0.5 - Math.random());

            const qDiv = document.createElement('div');
            qDiv.className = 'quiz-q';
            qDiv.innerText = currentQuestion.word;
            container.appendChild(qDiv);

            const optGroup = document.createElement('div');
            optGroup.className = 'quiz-options';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'quiz-opt-btn';
                btn.innerText = opt;
                btn.onclick = () => checkQuizAnswer(opt, currentQuestion.trans.join(', '));
                optGroup.appendChild(btn);
            });
            container.appendChild(optGroup);
        }

        function checkQuizAnswer(selected, correct) {
            if (selected === correct) {
                showToast('答對了');
            } else {
                showToast('答錯了');
            }
            currentQuizIndex++;
            setTimeout(nextQuizQuestion, 1000);
        }
    </script>
</body>
</html>
